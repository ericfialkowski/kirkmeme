name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
          - os: macos-latest
            goos: darwin
          - os: windows-latest
            goos: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install X11 dev dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcb1-dev

      - name: Build
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --clean --config .goreleaser.${{ matrix.goos }}.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist-linux

      - uses: actions/download-artifact@v4
        with:
          name: dist-darwin
          path: dist-darwin

      - uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist-windows

      - name: Merge dist directories
        run: |
          mkdir -p dist
          find dist-linux dist-darwin dist-windows -mindepth 1 -maxdepth 1 -type d -exec cp -r {} dist/ \;
          jq -s 'add' dist-linux/artifacts.json dist-darwin/artifacts.json dist-windows/artifacts.json > dist/artifacts.json
          cp dist-linux/metadata.json dist/

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --skip=build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
