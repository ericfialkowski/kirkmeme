name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install X11 dev dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcb1-dev

      - name: Run tests
        run: go test -v ./...
